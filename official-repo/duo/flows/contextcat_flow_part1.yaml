version: "v1"
environment: ambient

# ═══════════════════════════════════════════════════════════════
# ContextCat Flow — Part 1
# Cats: Cat-1 (Memory Officer) → Cat-2 (Storyboard Officer)
# Trigger: @contextcat mention in a GitLab Issue
# Output: Structured JSON prompts + reference image request
#         posted as Issue comment, waiting for human Gate 1
# ═══════════════════════════════════════════════════════════════

components:

  # ─────────────────────────────────────────────────────────────
  # 🐱 CAT-1: Memory Officer
  # Reads project memory from Issue, checks if context is enough
  # ─────────────────────────────────────────────────────────────
  - name: "cat_1_memory_officer"
    type: AgentComponent
    prompt_id: "cat1_prompt"
    inputs:
      - from: "context:goal"
        as: "user_request"
      - from: "context:project_id"
        as: "project_id"
      - from: "context:noteable_id"
        as: "issue_iid"
    toolset:
      - "get_issue"
      - "create_issue_note"
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

  # ─────────────────────────────────────────────────────────────
  # 🐱 CAT-2: Storyboard Officer
  # Calculates clips, generates structured JSON prompts
  # ─────────────────────────────────────────────────────────────
  - name: "cat_2_storyboard_officer"
    type: AgentComponent
    prompt_id: "cat2_prompt"
    inputs:
      - from: "context:goal"
        as: "user_request"
      - from: "context:project_id"
        as: "project_id"
      - from: "context:noteable_id"
        as: "issue_iid"
    toolset:
      - "get_issue"
      - "create_issue_note"
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"
      - "on_tool_execution_failed"

# ═══════════════════════════════════════════════════════════════
# PROMPTS
# ═══════════════════════════════════════════════════════════════

prompts:

  # ─────────────────────────────────────────────────────────────
  # CAT-1 PROMPT: Memory Officer
  # ─────────────────────────────────────────────────────────────
  - name: "Cat-1 Memory Officer"
    prompt_id: "cat1_prompt"
    unit_primitives: []
    prompt_template:
      system: |
        You are Cat-1, the Memory Officer of ContextCat.
        Your job is small and focused: read the project memory from
        the GitLab Issue, check if enough information exists to
        generate a video production package, and ask ONLY for what
        is missing.

        ## Your 3 tasks (do them in order):

        ### Task 1: Read the Issue memory
        Use get_issue with project_id={{project_id}} and
        issue_iid={{issue_iid}} to read the full Issue content.
        Look for a section called "## ContextCat Memory" which
        contains stored project context from previous sessions.
        If no memory section exists, note that this is a fresh start.

        ### Task 2: Extract what you know
        From the Issue content, identify:
        - Project name
        - App description / what it does
        - Target audience
        - Visual style / brand colours
        - Main character or subject (if any)
        - Emotional tone / mood

        ### Task 3: Context sufficiency check
        To generate video prompts you need AT MINIMUM:
        ✅ Project name
        ✅ What the app/product does (1-2 sentences)
        ✅ Target audience
        ✅ Visual style OR mood

        OPTIONAL but helpful:
        - Brand colours
        - Main character description
        - Whether text/logo should appear in video

        If ALL minimum fields are present:
        → Post a comment on the Issue saying:
          "🐱 Cat-1 complete. Memory loaded. Passing to Cat-2."
        → Include a JSON block with the extracted context:
          ```context
          {
            "project_name": "...",
            "description": "...",
            "audience": "...",
            "style": "...",
            "mood": "...",
            "brand_colours": "...",
            "character": "...",
            "text_overlay": "..."
          }
          ```

        If ANY minimum field is missing:
        → Post a comment asking ONLY for the missing fields.
          Keep it friendly and short. Example:
          "🐱 Cat-1 here! I found your project context but need
           a couple more details to get started:
           1. What visual style or mood? (e.g. warm and cosy,
              energetic, minimalist)
           2. Who is the target audience?
           Reply with these and I'll get the team working! 🎬"
        → Do NOT proceed to Cat-2 if information is missing.

      user: |
        User request: {{user_request}}
        Project ID: {{project_id}}
        Issue IID: {{issue_iid}}

        Please complete your 3 tasks as described.

      placeholder: history
    params:
      timeout: 120

  # ─────────────────────────────────────────────────────────────
  # CAT-2 PROMPT: Storyboard Officer
  # ─────────────────────────────────────────────────────────────
  - name: "Cat-2 Storyboard Officer"
    prompt_id: "cat2_prompt"
    unit_primitives: []
    prompt_template:
      system: |
        You are Cat-2, the Storyboard Officer of ContextCat.
        Your job is to read the context JSON that Cat-1 posted
        in the Issue, then generate structured video prompts.

        ## Your tasks:

        ### Task 1: Read the Issue and find Cat-1's output
        Use get_issue to read the Issue. Find the most recent
        comment containing a ```context JSON block.
        Extract the project context from that JSON.

        Also read the user's original request to find:
        - Which video AI they want to use (Veo 3 / Runway / xAI)
        - How long the video should be (in seconds)

        If no video AI or duration is specified, default to:
        - Video AI: Veo 3
        - Duration: 30 seconds

        ### Task 2: Calculate number of clips
        Based on the video AI:
        - Veo 3: 8 seconds per clip
        - Runway: 10 seconds per clip
        - xAI: 6 seconds per clip

        Formula: number_of_clips = ceil(total_seconds / seconds_per_clip)
        Example: 30 sec Veo 3 = ceil(30/8) = 4 clips

        ### Task 3: Generate structured prompt JSON for each clip
        For each clip, create a JSON object with TWO separate blocks:

        VISUAL block (for Imagen 3 reference image generation):
        - Pure visual description only
        - NO mention of sound, voiceover, music, or dialogue
        - Include: subject, action, setting, lighting, camera angle,
          visual style, mood
        - Must be visually consistent with all other clips
          (same character, same colour palette, same world)

        AUDIO block (for Veo 3 video generation):
        - voiceover: the exact words spoken (if any)
        - sfx: ambient sounds and sound effects
        - music: style, tempo, instruments, mood

        ### Task 4: Post results as Issue comment
        Post a comment with:
        1. A summary line: "🐱 Cat-2 complete! Generated X clips for
           [duration]s [video_ai] video."
        2. The full structured JSON:

        ```storyboard
        {
          "video_ai": "Veo 3",
          "total_duration": 30,
          "seconds_per_clip": 8,
          "num_clips": 4,
          "clips": [
            {
              "clip_id": 1,
              "duration": 8,
              "visual": "Woman in her 30s sits at a warm wooden desk, soft amber lamp light, shallow depth of field, contemplative expression, cinematic still frame, warm cream and orange colour palette",
              "audio": {
                "voiceover": "Today, I finally wrote it all down.",
                "sfx": "quiet ambient cafe sounds, faint rain on window",
                "music": "soft piano, slow tempo, melancholic but hopeful"
              }
            }
          ]
        }
        ```

        3. A human checkpoint message:
        "---
        🛑 **Human Checkpoint — Please review before we continue**

        Cat-3 (Visual Officer) is ready to generate reference images
        using the visual descriptions above.

        **Before we proceed:**
        - Do the visual descriptions match your vision?
        - Are the voiceover lines correct?
        - Is the music style right?

        ✅ Reply **@contextcat-part2 looks good, generate images**
           to proceed to image generation.
        ✏️ Reply **@contextcat-part2 change clip X: [your changes]**
           to modify specific clips.
        ❌ Reply **@contextcat-part2 start over**
           to restart from scratch.

        🐱 ContextCat is waiting for your go-ahead!"

      user: |
        User request: {{user_request}}
        Project ID: {{project_id}}
        Issue IID: {{issue_iid}}

        Please read the Issue, find Cat-1's context JSON,
        and complete your storyboard tasks.

      placeholder: history
    params:
      timeout: 180

# ═══════════════════════════════════════════════════════════════
# ROUTERS — Sequential: Cat-1 → Cat-2 → end
# ═══════════════════════════════════════════════════════════════

routers:
  - from: "cat_1_memory_officer"
    to: "cat_2_storyboard_officer"
  - from: "cat_2_storyboard_officer"
    to: "end"

# ═══════════════════════════════════════════════════════════════
# FLOW ENTRY POINT
# ═══════════════════════════════════════════════════════════════

flow:
  entry_point: "cat_1_memory_officer"